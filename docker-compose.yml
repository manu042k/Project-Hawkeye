services:
  hawkeye-sandbox:
    networks:
      - hawkeye-net
    container_name: hawkeye-sandbox
    build:
      context: ./Backend/hawkeye_sandbox/sandbox_image
      dockerfile: Dockerfile
    env_file:
      - .env
    ports:
      - "6080:6080"
      - "19223:9223" # CDP proxy for MCP servers (-> 9222 in-container)
    environment:
      DISPLAY: ":99"
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "720"
      SCREEN_DEPTH: "24"
      # Allow runtime override: CHROME_URL="..." docker compose up -d
      CHROME_URL: "${CHROME_URL:-about:blank}"
      CHROME_CDP_PORT: "${CHROME_CDP_PORT:-9222}"
      BROWSER: "${BROWSER:-chromium}"
      # Optional: if your site uses Google services, pass the key through.
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    restart: unless-stopped
    shm_size: "1gb"
    healthcheck:
      # Root serves an auto-connect noVNC index.html
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:6080/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - hawkeye-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hawkeye-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - Backend/.env
    environment:
      HAWKEYE_SANDBOX_IMAGE: "project-hawkeye-hawkeye-sandbox:latest"
      REDIS_URL: "redis://redis:6379/0"
    networks:
      - hawkeye-net
    depends_on:
      - hawkeye-sandbox
      - redis
    restart: unless-stopped

  hawkeye-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - Backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      HAWKEYE_SANDBOX_IMAGE: "project-hawkeye-hawkeye-sandbox:latest"
    networks:
      - hawkeye-net
    depends_on:
      - redis
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  hawkeye-nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - hawkeye-net
    depends_on:
      - hawkeye-api
    restart: unless-stopped

networks:
  hawkeye-net:
    driver: bridge

