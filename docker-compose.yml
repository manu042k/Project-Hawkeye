services:
  postgres:
    image: postgres:16-alpine
    container_name: hawkeye-postgres
    environment:
      POSTGRES_DB: hawkeye
      POSTGRES_USER: hawkeye
      POSTGRES_PASSWORD: hawkeye
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - hawkeye-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hawkeye -d hawkeye"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: hawkeye-redis
    ports:
      - "6379:6379"
    networks:
      - hawkeye-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  hawkeye-sandbox:
    image: project-hawkeye-hawkeye-sandbox:latest   # explicit tag so worker can find it
    build:
      context: ./Backend/hawkeye_sandbox/sandbox_image
      dockerfile: Dockerfile
    container_name: hawkeye-sandbox
    env_file:
      - Backend/.env
    ports:
      - "6080:6080"
      - "19223:9223"
    environment:
      DISPLAY: ":99"
      SCREEN_WIDTH: "1280"
      SCREEN_HEIGHT: "720"
      SCREEN_DEPTH: "24"
      CHROME_URL: "${CHROME_URL:-about:blank}"
      CHROME_CDP_PORT: "${CHROME_CDP_PORT:-9222}"
      BROWSER: "${BROWSER:-chromium}"
      GOOGLE_API_KEY: "${GOOGLE_API_KEY:-}"
    networks:
      - hawkeye-net
    restart: unless-stopped
    shm_size: "1gb"
    healthcheck:
      test: ["CMD", "bash", "-lc", "curl -fsS http://localhost:6080/ >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20

  hawkeye-api:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    container_name: hawkeye-api
    ports:
      - "8000:8000"
    env_file:
      - Backend/.env
    environment:
      HAWKEYE_SANDBOX_IMAGE: "project-hawkeye-hawkeye-sandbox:latest"
      REDIS_URL: "redis://redis:6379/0"
      HAWKEYE_DB_URL: "postgresql://hawkeye:hawkeye@postgres:5432/hawkeye"
    networks:
      - hawkeye-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      hawkeye-sandbox:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  hawkeye-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    container_name: hawkeye-worker
    command: celery -A api.celery_app worker --loglevel=info --concurrency=2
    env_file:
      - Backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      HAWKEYE_SANDBOX_IMAGE: "project-hawkeye-hawkeye-sandbox:latest"
      HAWKEYE_DB_URL: "postgresql://hawkeye:hawkeye@postgres:5432/hawkeye"
    networks:
      - hawkeye-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  hawkeye-beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile.api
    container_name: hawkeye-beat
    command: celery -A api.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler --schedule /app/celerybeat/celerybeat-schedule
    env_file:
      - Backend/.env
    environment:
      REDIS_URL: "redis://redis:6379/0"
      HAWKEYE_DB_URL: "postgresql://hawkeye:hawkeye@postgres:5432/hawkeye"
    networks:
      - hawkeye-net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - beat_schedule:/app/celerybeat   # persists schedule across restarts

  hawkeye-frontend:
    build:
      context: ./Frontend/hawkeye-web
      dockerfile: Dockerfile
    container_name: hawkeye-frontend
    ports:
      - "3000:3000"
    env_file:
      - Frontend/hawkeye-web/.env.local
    environment:
      NEXT_PUBLIC_API_URL: "http://hawkeye-nginx:80"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
    networks:
      - hawkeye-net
    depends_on:
      hawkeye-api:
        condition: service_healthy
    restart: unless-stopped

  hawkeye-nginx:
    image: nginx:alpine
    container_name: hawkeye-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - hawkeye-net
    depends_on:
      hawkeye-api:
        condition: service_healthy
    restart: unless-stopped

networks:
  hawkeye-net:
    driver: bridge

volumes:
  postgres_data:
  beat_schedule:
