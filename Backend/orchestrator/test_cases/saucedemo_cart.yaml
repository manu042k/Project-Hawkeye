id: "TC-002b"
name: "SauceDemo â€” login, add product to cart, and verify"
suite: "e-commerce"
priority: "P1"
tags: ["saucedemo", "cart", "login", "smoke"]
created_by: "<user-id>"
project: "<project-id>"
save_record: false

target:
  url: "https://www.saucedemo.com"
  browser: "chromium"
  viewport:
    width: 1280
    height: 720
    device_scale_factor: 1.0
  page_type: spa
  app_description: |
    SauceDemo is a fake e-commerce site built for testing purposes.
    It requires login before any shopping can be done.
  vault:
    - key: username
      value: standard_user
    - key: password
      value: secret_sauce

goal:
  objective: |
    Log in to SauceDemo, add exactly one product to the cart,
    navigate to the cart, and confirm the product is listed there.
    Do not proceed to checkout.

  constraints:
    max_steps: 20
    timeout_seconds: 300
    max_retries_per_action: 2

  extra_details: |
    Add only ONE product â€” do not add multiple items.
    The cart icon is in the top-right corner and shows a badge count.
    After adding a product, click the cart icon to navigate to the cart page.

  steps:
    checkpoints:

      - id: S1
        description: |
          Log in using username "standard_user" and password "secret_sauce".
        success_signal: |
          The product listing page is visible showing multiple products
          with titles, prices, and "Add to cart" buttons.

      - id: S2
        description: |
          Click "Add to cart" on any single product.
        success_signal: |
          The button changes to "Remove" and the cart icon in the
          top-right shows a badge count of 1.

      - id: S3
        description: |
          Click the cart icon in the top-right to navigate to the cart page.
        success_signal: |
          The cart page is visible showing the product name, quantity,
          and price under the "Your Cart" heading.

      - id: S4
        description: |
          Confirm the cart contents are correct.
        success_signal: |
          Exactly one item is listed in the cart with a name and price.
          The goal is complete â€” do not click checkout.

on_failure:
  capture:
    screenshot: true
    dom_snapshot: true
    network_log: true
    console_log: true
    agent_trace: true
    video: true
  notify: {}
