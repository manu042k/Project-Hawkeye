id: "TC-003"
name: "Temu: search product, add to cart, verify cart"
suite: "phase1-smoke"
priority: "P1"
tags: ["temu", "cart", "e-commerce"]

target:
  url: "https://www.temu.com"
  browser: "chromium"
  viewport:
    width: 1280
    height: 720

goal: |
  Starting from the Temu homepage, search for 'wireless headphones',
  open any product from the results, add it to the cart, navigate to
  the cart, and verify the item is present.

steps: null

assertions:
  - id: "A1"
    type: "content"
    description: "Cart contains a product"
    params:
      check: "text_present"
      text: "headphones"

  - id: "A2"
    type: "content"
    description: "Cart shows a price"
    params:
      check: "text_matches"
      pattern: "\\$[0-9]+"

  - id: "A3"
    type: "console"
    description: "No critical JS errors"
    params:
      level: "error"
      max_count: 20
      ignore_patterns:
        - "favicon"
        - "analytics"
        - "beacon"
        - "401"
        - "Failed to load resource"
        - "ads"

constraints:
  max_steps: 25
  timeout_seconds: 360
  navigation_policy: "interact_only"
  forbidden_actions:
    - "proceed to checkout"
    - "enter payment information"
    - "place an order"
  required_behaviors:
    - "verify cart contents by navigating to the cart page"

context:
  page_type: "spa"
  app_description: |
    Temu — e-commerce marketplace. Products are listed on search results
    with thumbnails. Cart is accessible via the cart icon in the header.
  hints:
    - "Dismiss any popups or cookie banners before proceeding"
    - "If the site redirects to a login page and you cannot dismiss it or navigate away, emit <GOAL_BLOCKED> with explanation 'Site requires login'"
    - "If a CAPTCHA appears, emit <GOAL_BLOCKED> with explanation 'CAPTCHA encountered'"
    - "Use the search bar at the top to search for 'wireless headphones'"
    - "After search results load, click on any product thumbnail or title to open the product page"
    - "On the product page, find and click the 'Add to cart' button"
    - "After adding to cart, click the cart icon in the header to go to the cart page"
    - "Once the cart page shows the item, emit <GOAL_COMPLETE> as plain text without a tool call"
    - "Do NOT proceed to checkout or enter any payment details"
