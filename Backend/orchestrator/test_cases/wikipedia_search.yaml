id: "TC-001"
name: "Wikipedia — search for AI article and scroll through content"
suite: "smoke"
priority: "P1"
tags: ["wikipedia", "search", "scroll", "smoke"]
created_by: "<user-id>"
project: "<project-id>"
save_record: false

target:
  url: "https://www.wikipedia.org"
  browser: "chromium"
  viewport:
    width: 1280
    height: 720
    device_scale_factor: 1.0
  page_type: ssr
  app_description: |
    Wikipedia is a free multilingual online encyclopedia. Articles are
    server-rendered. The homepage has a prominent search box.

goal:
  objective: |
    From the Wikipedia homepage, search for "artificial intelligence",
    open the article, and scroll through multiple sections of the content.

  constraints:
    max_steps: 20
    timeout_seconds: 600
    max_retries_per_action: 2

  extra_details: |
    Search homepage is https://www.wikipedia.org — this has the main search box.
    After searching, you will land on en.wikipedia.org/wiki/Artificial_intelligence.
    Once you are on the article page DO NOT navigate away. Do not go back to any homepage.
    Scroll through the article 3 times using PageDown, then immediately emit <GOAL_COMPLETE>.
    Do not re-search, do not navigate to Main_Page, do not repeat the search loop.

  steps:
    checkpoints:

      - id: S1
        description: |
          Type "artificial intelligence" into the search box on the
          Wikipedia homepage and submit the search.
        success_signal: |
          Either the Artificial Intelligence article page loads directly,
          or a search results page appears with the article as the top result.

      - id: S2
        description: |
          If on a search results page, click the "Artificial intelligence"
          article link to open it.
        success_signal: |
          The full Wikipedia article on Artificial Intelligence is visible
          with the title "Artificial intelligence" at the top of the page.

      - id: S3
        description: |
          Use the scroll_page tool with direction="down" and times=3 to
          scroll through the article content in a single call.
        success_signal: |
          scroll_page returns confirming 3 viewport scrolls completed.
          The page has scrolled down showing content beyond the introduction.

      - id: S4
        description: |
          Confirm the article was successfully read and the goal is complete.
        success_signal: |
          The Artificial Intelligence article is open and multiple sections
          are visible after scrolling. The goal is complete.

on_failure:
  capture:
    screenshot: true
    dom_snapshot: true
    network_log: true
    console_log: true
    agent_trace: true
    video: true
  notify: {}
