
id: "TC-002"
name: "Amazon: add product to cart, verify cart"
suite: "phase1-smoke"
priority: "P1"
tags: ["amazon", "cart", "e-commerce"]

target:
  url: "https://www.amazon.com"
  browser: "chromium"
  viewport:
    width: 1280
    height: 720

goal: |
  Navigate to the Amazon product page for Sony WH-1000XM5 headphones,
  add the product to the cart, navigate to the cart, and verify the
  item is present in the cart.

steps: null

assertions:
  - id: "A1"
    type: "content"
    description: "Cart contains a headphones item"
    params:
      check: "text_present"
      text: "headphones"

  - id: "A2"
    type: "content"
    description: "Cart shows a price or subtotal"
    params:
      check: "text_matches"
      pattern: "\\$[0-9]+\\.[0-9]{2}"

  - id: "A3"
    type: "console"
    description: "No critical JS errors during the flow"
    params:
      level: "error"
      max_count: 20
      ignore_patterns:
        - "favicon"
        - "analytics"
        - "beacon"
        - "ads"
        - "adsystem"
        - "doubleclick"
        - "Track"
        - "wamazin"
        - "ueLogError"
        - "mix_csa"
        - "csm"
        - "Late loading"
        - "logLevel"
        - "401"
        - "Failed to load resource"
        - "Unauthorized"

constraints:
  max_steps: 20
  timeout_seconds: 300
  navigation_policy: "explicit_urls_allowed"
  forbidden_actions:
    - "proceed to checkout"
    - "enter payment information"
    - "place an order"
    - "buy now"
  required_behaviors:
    - "verify cart contents by navigating to the cart page"

context:
  page_type: "spa"
  app_description: |
    Amazon.com — major e-commerce platform. Heavy JavaScript. No login needed
    to add items to a session cart.
  hints:
    - "Step 1: use browser_navigate to go to https://www.amazon.com/dp/B09G9HD6PD (Sony WH-1000XM5 headphones)"
    - "Step 2: call wait_for_stable to ensure the product page is fully loaded"
    - "Step 3: take a browser_snapshot to find the 'Add to Cart' button ref in the accessibility tree"
    - "Step 4: click the 'Add to Cart' button using its ref from the snapshot"
    - "Step 5: call wait_for_stable again to wait for the cart confirmation"
    - "Step 6: use browser_navigate to go to https://www.amazon.com/cart"
    - "Step 7: take a snapshot and verify headphones appear in the cart, then emit <GOAL_COMPLETE>"
    - "NEVER click any link directly — always use browser_navigate with an explicit URL"
    - "If Amazon shows a CAPTCHA or sign-in wall that cannot be dismissed, emit <GOAL_BLOCKED>"
    - "The 'Add to Cart' button may take 3-8 seconds to respond — always call wait_for_stable before and after clicking it"
