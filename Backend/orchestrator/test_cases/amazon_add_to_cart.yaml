id: "TC-002"
name: "Amazon â€” add product to cart and verify"
suite: "e-commerce"
priority: "P1"
tags: ["amazon", "cart", "e-commerce", "smoke"]
created_by: "usr_123"  # user ID
project: "proj_456"  # project ID
save_record: false # set to true to save a video recording of the run

target:
  url: "https://www.amazon.com"
  browser: "chromium"
  viewport:
    width: 1280
    height: 720
    device_scale_factor: 1.0
  page_type: spa
  app_description: |
    Amazon.com is a large e-commerce platform with heavy JavaScript rendering.
    No login is needed to add items to a guest session cart.
  vault:
    - key: username
      value: my-amazon-username
    - key: password
      value: my-amazon-password

goal:
  objective: |
    Go to the Amazon product page for Sony WH-1000XM5 headphones,
    add the item to the cart, then navigate to the cart and confirm
    the item is present. Do not proceed to checkout.

  constraints:
    max_steps: 20
    timeout_seconds: 300
    max_retries_per_action: 2

  extra_details: |
    Always navigate using explicit URLs rather than clicking links.
    The Add to Cart button may take 3â€“8 seconds to respond â€” wait for
    confirmation before navigating away.
    If a CAPTCHA or mandatory sign-in wall appears that cannot be
    dismissed, emit <GOAL_BLOCKED>.

  steps:
    checkpoints:
      - id: S1
        description: |
          Navigate to the Sony WH-1000XM5 headphones product page at
          https://www.amazon.com/dp/B09G9HD6PD and wait for it to fully load.
        success_signal: |
          The product page is visible showing the headphones title, price,
          and an "Add to Cart" button.

      - id: S2
        description: |
          Click the "Add to Cart" button and wait for confirmation that
          the item was added.
        success_signal: |
          A cart confirmation message appears, or the cart icon in the
          page header shows an incremented item count.

      - id: S3
        description: |
          Navigate to the shopping cart at https://www.amazon.com/cart.
        success_signal: |
          The cart page loads and shows the Sony WH-1000XM5 headphones
          with its name and unit price visible.

      - id: S4
        description: |
          Review the cart contents and confirm everything looks correct.
        success_signal: |
          The cart displays the headphones item and a subtotal amount.
          The goal is complete â€” do not click checkout or Buy Now.

on_failure:
  capture:
    screenshot: true
    dom_snapshot: true
    network_log: true
    console_log: true
    agent_trace: true
    video: true # always record video on failure
  notify: {} # e.g. email, slack â€” configure per project
