[supervisord]
nodaemon=true
logfile=/dev/null
pidfile=/tmp/supervisord.pid

[program:xvfb]
command=/usr/bin/Xvfb :99 -screen 0 1280x720x24 -nolisten tcp
priority=10
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:x11vnc]
command=/bin/bash -lc "for i in {1..30}; do [ -S /tmp/.X11-unix/X99 ] && break; sleep 0.2; done; exec /usr/bin/x11vnc -display :99 -rfbport 5900 -forever -shared -viewonly -nopw -xkb -noxrecord -noxfixes -noxdamage -o /dev/stdout"
priority=20
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0

[program:websockify]
command=/bin/bash -lc "for i in {1..40}; do (echo > /dev/tcp/127.0.0.1/5900) >/dev/null 2>&1 && break; sleep 0.25; done; exec /usr/bin/websockify --web=/usr/share/novnc 0.0.0.0:6080 127.0.0.1:5900"
priority=30
autostart=true
autorestart=true
startsecs=2
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
